name: Build iOS App
on: [push]

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Xcode version
        run: xcodebuild -version

      - name: List schemes
        run: xcodebuild -project CallBlocker/CallBlocker.xcodeproj -list

      - name: Build (ad-hoc signing)
        run: |
          xcodebuild clean build \
            -project CallBlocker/CallBlocker.xcodeproj \
            -scheme CallBlocker \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            SKIP_INSTALL=NO \
            -derivedDataPath build

      - name: Vérifie extension embarquée
        run: |
          APP_PATH=$(find build/Build/Products/Release-iphoneos -name "CallBlocker.app" -not -path "*/PlugIns/*" | head -1)
          echo "=== Contenu du .app ==="
          find "$APP_PATH" -maxdepth 3 | sort
          echo ""
          echo "=== Vérifie signature extension ==="
          codesign -dv "$APP_PATH/PlugIns/CallDirectoryHandler.appex" 2>&1 || echo "Extension non signée !"

      - name: Package IPA
        run: |
          APP_PATH=$(find build/Build/Products/Release-iphoneos -name "CallBlocker.app" -not -path "*/PlugIns/*" | head -1)
          echo "App trouvée : $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r CallBlocker.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: CallBlocker-IPA
          path: CallBlocker.ipa
