name: Build iOS App
on: [push]

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Xcode version
        run: xcodebuild -version

      - name: List schemes
        run: xcodebuild -project CallBlocker/CallBlocker.xcodeproj -list

      - name: Build
        run: |
          xcodebuild clean build \
            -project CallBlocker/CallBlocker.xcodeproj \
            -scheme CallBlocker \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            -derivedDataPath build

      - name: Vérification de l'extension
        run: |
          APP_PATH=$(find build/Build/Products/Release-iphoneos -name "CallBlocker.app" -not -path "*/PlugIns/*" | head -1)
          echo "App : $APP_PATH"
          echo "=== Contenu ==="
          find "$APP_PATH" | sort
          echo "=== Info.plist extension ==="
          plutil -p "$APP_PATH/PlugIns/CallDirectoryHandler.appex/Info.plist" 2>/dev/null || echo "Extension introuvable !"
          echo "=== NSExtensionPrincipalClass ==="
          /usr/libexec/PlistBuddy -c "Print NSExtension:NSExtensionPrincipalClass" "$APP_PATH/PlugIns/CallDirectoryHandler.appex/Info.plist" 2>/dev/null || echo "Clé introuvable"

      - name: Package IPA
        run: |
          APP_PATH=$(find build/Build/Products/Release-iphoneos -name "CallBlocker.app" -not -path "*/PlugIns/*" | head -1)
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          if [ -d "Payload/CallBlocker.app/PlugIns/CallDirectoryHandler.appex" ]; then
            echo "✅ Extension présente dans le Payload"
          else
            echo "❌ Extension ABSENTE — erreur de build !"
            exit 1
          fi
          zip -r CallBlocker.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: CallBlocker-IPA
          path: CallBlocker.ipa
