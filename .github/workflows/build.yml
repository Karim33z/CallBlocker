name: Build iOS App
on: [push]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: List schemes
        run: xcodebuild -project CallBlocker/CallBlocker.xcodeproj -list

      - name: Build
        run: |
          xcodebuild clean build \
            -project CallBlocker/CallBlocker.xcodeproj \
            -scheme CallBlocker \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SKIP_INSTALL=NO \
            -derivedDataPath build

      - name: Vérifie ce qui a été buildé
        run: find build/Build/Products/Release-iphoneos/ -maxdepth 3 -name "*.app" -o -name "*.appex" | head -20

      - name: Package IPA
        run: |
          APP_PATH=$(find build/Build/Products/Release-iphoneos -name "CallBlocker.app" -not -path "*/PlugIns/*" | head -1)
          echo "App trouvée : $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r CallBlocker.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: CallBlocker-IPA
          path: CallBlocker.ipa
