name: Build FakeCall IPA
on: [push]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Xcode version
        run: xcodebuild -version

      - name: List schemes
        run: xcodebuild -project FakeCall.xcodeproj -list

      - name: Build
        run: |
          xcodebuild clean build \
            -project FakeCall.xcodeproj \
            -scheme FakeCall \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            -derivedDataPath build

      - name: Package IPA
        run: |
          APP=$(find build/Build/Products/Release-iphoneos -name "FakeCall.app" | head -1)
          echo "App : $APP"
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r FakeCall.ipa Payload
          ls -lh FakeCall.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: FakeCall-IPA
          path: FakeCall.ipa
